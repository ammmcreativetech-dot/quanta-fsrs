name: CI + Publish to npm

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    # Publish on push to main OR on v* tags
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_GH_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci

      # Auto-bump patch version on push to main (not on manual v* tags)
      - name: Bump patch version (push to main only)
        if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
        run: |
          git config user.name "quanta-sync-bot"
          git config user.email "bot@quanta-study.de"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "chore: bump to v${VERSION} [skip ci]"
          git push

      - run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify-backlink:
    name: Ping WebSub Hub (Backlink SEO)
    needs: publish
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Notify quanta-study.de feed
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://pubsubhubbub.appspot.com/ \
            --data-urlencode "hub.mode=publish" \
            --data-urlencode "hub.url=https://quanta-study.de/feed.xml"
